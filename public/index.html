<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<title>SMART HAMYON PRO</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-black text-white font-sans">

<!-- HEADER -->
<div class="flex justify-between items-center p-4 border-b border-gray-800">
  <h1 class="text-xl text-cyan-400">SMART HAMYON 🚀</h1>
  <button class="bg-cyan-500 px-4 py-2 rounded">Kirish</button>
</div>

<!-- LOGIN / REGISTER UI 🔥 -->
<div class="p-6 max-w-md mx-auto bg-gray-900 rounded mt-6">
  <h2 class="text-xl mb-4 text-center text-green-400">Kirish / Ro‘yxatdan o‘tish</h2>

  <input id="email" placeholder="Email"
    class="w-full p-2 mb-3 rounded text-black">

  <input id="pass" type="password" placeholder="Password"
    class="w-full p-2 mb-3 rounded text-black">

  <div class="flex gap-2">
    <button onclick="register()"
      class="bg-green-500 px-4 py-2 rounded w-full">
      Register
    </button>

    <button onclick="login()"
      class="bg-blue-500 px-4 py-2 rounded w-full">
      Login
    </button>
  </div>
</div>

<!-- BALANCE -->
<div class="p-6">
  <h2 class="text-gray-400">Umumiy balans</h2>
  <h1 class="text-3xl text-green-400">$12,450</h1>
</div>

<!-- WALLET CARDS -->
<div class="grid grid-cols-2 md:grid-cols-4 gap-4 p-4">

  <div class="bg-gray-900 p-4 rounded">
    <h2>BTC</h2>
    <p>0.45</p>
  </div>

  <div class="bg-gray-900 p-4 rounded">
    <h2>ETH</h2>
    <p>2.1</p>
  </div>

  <div class="bg-gray-900 p-4 rounded">
    <h2>USDT</h2>
    <p>500</p>
  </div>

  <div class="bg-gray-900 p-4 rounded">
    <h2>TON</h2>
    <p>120</p>
  </div>

</div>

<!-- BUTTONS -->
<div class="flex gap-4 p-4">
  <button class="bg-green-500 px-4 py-2 rounded">Yuborish</button>
  <button class="bg-blue-500 px-4 py-2 rounded">Qabul qilish</button>
  <button class="bg-purple-500 px-4 py-2 rounded">Almashtirish</button>
</div>

<!-- API TEST -->
<div class="p-4">
  <button onclick="testAPI()" class="bg-cyan-500 px-4 py-2 rounded">
    API TEST
  </button>

  <div id="out" class="mt-4 text-green-400"></div>
</div>

<!-- 🔥 SCRIPTLAR -->
<script>
async function register(){
  let email = document.getElementById("email").value
  let password = document.getElementById("pass").value

  let res = await fetch("/auth/register",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({email,password})
  })

  let data = await res.json()
  alert(data.msg || "Ro‘yxatdan o‘tildi")
}

async function login(){
  let email = document.getElementById("email").value
  let password = document.getElementById("pass").value

  let res = await fetch("/auth/login",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({email,password})
  })

  let data = await res.json()
  alert(data.msg || "Kirish bajarildi")
}

async function testAPI(){
  let res = await fetch("/auth")
  let data = await res.json()
  document.getElementById("out").innerText = JSON.stringify(data)
}
</script>

</body>
</html>
