<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trading Sniper Signal – Antigravity Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap');
        
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: linear-gradient(180deg, #0a0f1c 0%, #02040a 100%);
        }
        .title-font {
            font-family: 'Space Grotesk', sans-serif;
        }

        .glass {
            background: rgba(15, 23, 42, 0.72);
            backdrop-filter: blur(24px);
            border: 1px solid rgba(148, 163, 184, 0.25);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }

        .razgon-glow {
            box-shadow: 0 0 35px #ff00ff,
                        0 0 60px rgba(255, 0, 255, 0.7),
                        inset 0 0 20px rgba(255, 0, 255, 0.3);
            animation: razgonPulse 2.4s infinite alternate ease-in-out;
        }

        @keyframes razgonPulse {
            from { 
                box-shadow: 0 0 30px #ff00ff, 0 0 50px rgba(255, 0, 255, 0.5); 
            }
            to { 
                box-shadow: 0 0 50px #ff00ff, 0 0 85px rgba(255, 0, 255, 0.8), 
                            inset 0 0 30px rgba(255, 0, 255, 0.4); 
            }
        }

        .neon-cyan {
            text-shadow: 0 0 15px #00f5ff,
                         0 0 30px #00f5ff;
        }

        .neon-magenta {
            text-shadow: 0 0 15px #ff00ff,
                         0 0 30px #ff00ff;
        }

        .signal-card {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .signal-card:hover {
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
        }

        #chart {
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 0 60px rgba(0, 245, 255, 0.15);
        }

        .market-tab.active {
            background: linear-gradient(to right, #22d3ee, #a855f7);
            color: black;
            font-weight: 700;
            box-shadow: 0 0 20px rgba(34, 211, 238, 0.6);
        }

        .drop-zone {
            transition: all 0.4s ease;
        }
    </style>
</head>
<body class="text-slate-200 overflow-hidden">

<div class="flex h-screen">

    <!-- Sidebar -->
    <div class="w-72 bg-zinc-950 border-r border-slate-700 flex flex-col">
        <div class="p-6 border-b border-slate-700">
            <h1 class="title-font text-4xl font-bold tracking-tighter neon-cyan">SNIPER</h1>
            <p class="text-emerald-400 text-xs tracking-[3px] mt-1">ANTIGRAVITY EDITION</p>
        </div>

        <!-- Market Tabs -->
        <div class="p-5">
            <div id="market-tabs" class="grid grid-cols-4 gap-2">
                <button onclick="switchMarket(0)" data-market="0" class="market-tab py-3.5 text-sm font-medium rounded-2xl transition-all">Forex</button>
                <button onclick="switchMarket(1)" data-market="1" class="market-tab py-3.5 text-sm font-medium rounded-2xl transition-all">Crypto</button>
                <button onclick="switchMarket(2)" data-market="2" class="market-tab py-3.5 text-sm font-medium rounded-2xl transition-all active">Synthetic</button>
                <button onclick="switchMarket(3)" data-market="3" class="market-tab py-3.5 text-sm font-medium rounded-2xl transition-all">Aksiyalar</button>
            </div>
        </div>

        <!-- Symbols -->
        <div class="px-5">
            <div class="text-xs text-slate-400 mb-3 px-1">SYMBOLS</div>
            <div id="symbols-list" class="flex flex-wrap gap-2"></div>
        </div>

        <!-- Strategies -->
        <div class="mt-8 px-5">
            <div class="flex justify-between items-center mb-4 px-1">
                <div class="text-xs uppercase tracking-widest text-slate-400">STRATEGIES</div>
                <button onclick="toggleConfluence()" id="confluence-btn"
                        class="px-5 py-1.5 text-xs rounded-2xl transition-all bg-slate-800 hover:bg-slate-700">
                    <span id="confluence-label" class="font-semibold">Confluence OFF</span>
                </button>
            </div>
            <div id="strategy-list" class="space-y-3"></div>
        </div>

        <div class="mt-auto p-5 border-t border-slate-700">
            <button onclick="toggleLanguage()" 
                    class="w-full py-4 bg-slate-900 hover:bg-slate-800 rounded-3xl flex items-center justify-center gap-3 text-sm font-medium">
                <i class="fas fa-globe text-cyan-400"></i>
                <span id="current-lang">UZ</span>
            </button>
        </div>
    </div>

    <!-- Main Content -->
    <div class="flex-1 flex flex-col">
        <!-- Top Bar -->
        <div class="h-16 border-b border-slate-700 bg-zinc-950/80 backdrop-blur-xl flex items-center px-8 justify-between z-10">
            <div class="flex items-center gap-10">
                <div class="flex items-center gap-5">
                    <span id="current-symbol" class="font-mono text-3xl font-bold text-white"></span>
                    <span id="current-price" class="font-mono text-4xl font-bold text-emerald-400 neon-cyan"></span>
                </div>
                <div id="timeframes" class="flex bg-zinc-900 rounded-3xl p-1 shadow-inner">
                    <div onclick="changeTimeframe(0)" class="timeframe-btn px-6 py-2 rounded-3xl cursor-pointer text-sm">M1</div>
                    <div onclick="changeTimeframe(1)" class="timeframe-btn px-6 py-2 rounded-3xl cursor-pointer text-sm">M5</div>
                    <div onclick="changeTimeframe(2)" class="timeframe-btn px-6 py-2 rounded-3xl cursor-pointer text-sm bg-slate-700">M15</div>
                    <div onclick="changeTimeframe(3)" class="timeframe-btn px-6 py-2 rounded-3xl cursor-pointer text-sm">H1</div>
                    <div onclick="changeTimeframe(4)" class="timeframe-btn px-6 py-2 rounded-3xl cursor-pointer text-sm">H4</div>
                </div>
            </div>

            <div class="flex items-center gap-5">
                <button onclick="scanMarket()" 
                        class="flex items-center gap-3 bg-gradient-to-r from-cyan-500 via-violet-500 to-fuchsia-500 hover:brightness-110 px-8 py-3.5 rounded-3xl font-semibold text-sm shadow-lg transition-all active:scale-95">
                    <i class="fas fa-bolt-lightning"></i>
                    <span>SCAN MARKET</span>
                </button>
                <button onclick="toggleFullScreen()" class="p-4 text-slate-300 hover:text-white hover:bg-slate-800 rounded-3xl transition-all">
                    <i class="fas fa-expand"></i>
                </button>
            </div>
        </div>

        <!-- Chart -->
        <div class="flex-1 p-6">
            <div id="chart" class="w-full h-full"></div>
        </div>

        <!-- Signal Log -->
        <div class="h-72 border-t border-slate-700 bg-zinc-950/90 p-6">
            <div class="flex justify-between items-center mb-4">
                <div class="uppercase text-xs tracking-widest font-medium flex items-center gap-2">
                    <i class="fas fa-signal"></i> LIVE SIGNAL STREAM
                </div>
                <button onclick="clearLog()" class="text-xs text-red-400 hover:text-red-300">CLEAR LOG</button>
            </div>
            <div id="signal-log" class="grid grid-cols-3 gap-4 overflow-auto h-full"></div>
        </div>
    </div>

    <!-- Right Panel -->
    <div class="w-96 bg-zinc-950 border-l border-slate-700 flex flex-col">
        <!-- Account -->
        <div class="p-7 border-b border-slate-700">
            <div class="text-xs uppercase tracking-[2px] text-slate-400 mb-2">DEMO ACCOUNT</div>
            <div class="flex justify-between">
                <div>
                    <div id="balance" class="text-4xl font-bold font-mono text-white">$12,458.75</div>
                    <div id="equity" class="text-emerald-400 text-lg font-medium">$12,521.40 <span class="text-xs">(+0.50%)</span></div>
                </div>
                <div class="text-right">
                    <div class="text-xs text-slate-400">OPEN P/L</div>
                    <div id="total-pl" class="text-3xl font-bold text-emerald-400">+$62.65</div>
                </div>
            </div>
        </div>

        <!-- Risk -->
        <div class="p-7 border-b border-slate-700">
            <div class="flex justify-between mb-3">
                <span class="text-sm text-slate-400">Risk per trade</span>
                <span id="risk-value" class="font-mono text-cyan-400 font-bold">1.8%</span>
            </div>
            <input type="range" min="0.1" max="5" step="0.1" value="1.8" 
                   oninput="updateRisk(this.value)" 
                   class="w-full accent-fuchsia-500">
            <div class="grid grid-cols-2 gap-8 mt-6">
                <div>
                    <div class="text-xs text-slate-400">Lot Size</div>
                    <div id="lot-size" class="text-3xl font-bold font-mono text-white">0.21</div>
                </div>
                <div>
                    <div class="text-xs text-slate-400">Est. Risk</div>
                    <div id="est-risk" class="text-3xl font-bold font-mono text-amber-400">$224.26</div>
                </div>
            </div>
        </div>

        <!-- Positions -->
        <div class="flex-1 flex flex-col">
            <div class="px-7 py-5 border-b border-slate-700 bg-zinc-900 flex justify-between items-center">
                <div class="font-semibold">OPEN POSITIONS</div>
                <span id="positions-count" class="bg-slate-800 px-5 py-1 rounded-2xl text-xs">0</span>
            </div>
            <div id="positions-list" class="flex-1 overflow-auto p-6 space-y-4"></div>
        </div>

        <!-- Neural Vision -->
        <div class="p-7 border-t border-slate-700 bg-zinc-950">
            <div class="uppercase text-xs tracking-widest text-slate-400 mb-4 flex items-center gap-2">
                <i class="fas fa-brain text-violet-400"></i> NEURAL VISION
            </div>
            <div id="drop-zone" 
                 class="drop-zone glass border-2 border-dashed border-slate-600 hover:border-violet-400 rounded-3xl h-52 flex flex-col items-center justify-center cursor-pointer">
                <i class="fas fa-cloud-upload-alt text-6xl text-slate-500 mb-4"></i>
                <p class="font-medium text-center">Screenshot yuklang<br> yoki shu yerga torting</p>
                <input type="file" id="screenshot-input" accept="image/*" class="hidden">
            </div>
            <div id="analysis-result" class="hidden mt-6"></div>
        </div>
    </div>
</div>

<script>
// ==================== 8-BOSQICH: DIZAYN POLISHING + OLDINGI HAMMASI ====================

let chart = null;
let candleSeries = null;
let currentMarket = 2;
let currentSymbol = "Volatility 75";
let currentTimeframe = 2;
let isConfluence = false;
let language = "uz";

let balance = 12458.75;
let equity = 12521.40;
let positions = [];
let tradeHistory = [];

const symbolsByMarket = {
    0: ["EURUSD", "GBPUSD", "USDJPY", "AUDUSD"],
    1: ["BTCUSDT", "ETHUSDT", "SOLUSDT"],
    2: ["Volatility 75", "Boom 500", "Crash 1000", "Step Index"],
    3: ["AAPL", "TSLA", "NVDA"]
};

function createChart() {
    const container = document.getElementById('chart');
    if (chart) chart.remove();
    chart = LightweightCharts.createChart(container, {
        width: container.clientWidth,
        height: container.clientHeight,
        layout: { background: { color: '#0a0f1c' }, textColor: '#94a3b8' },
        grid: { vertLines: { color: '#1e2937' }, horzLines: { color: '#1e2937' } },
        crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
        timeScale: { timeVisible: true, borderColor: '#334155' }
    });
    candleSeries = chart.addCandlestickSeries({
        upColor: '#22c55e', downColor: '#ef4444',
        borderUpColor: '#22c55e', borderDownColor: '#ef4444',
        wickUpColor: '#86efac', wickDownColor: '#f87171'
    });
}

function generateMockCandles(count = 220) {
    const data = [];
    let time = Math.floor(Date.now() / 1000) - count * 900;
    let price = currentMarket === 2 ? 1248.65 : currentMarket === 1 ? 65234 : 1.0874;
    for (let i = 0; i < count; i++) {
        const open = price;
        const vol = currentMarket === 2 ? 22 : currentMarket === 1 ? 220 : 0.012;
        const change = (Math.random() - 0.46) * vol;
        const close = open + change;
        const high = Math.max(open, close) + Math.random() * vol * 1.4;
        const low = Math.min(open, close) - Math.random() * vol * 1.4;
        data.push({ time, open: +open.toFixed(5), high: +high.toFixed(5), low: +low.toFixed(5), close: +close.toFixed(5) });
        price = close;
        time += 900;
    }
    return data;
}

function renderChart() {
    if (!candleSeries) return;
    const data = generateMockCandles();
    candleSeries.setData(data);
    chart.timeScale().fitContent();
    addConfluenceSignalsToChart(data);
}

function addConfluenceSignalsToChart(data) {
    const markers = [];
    const points = [48, 82, 119, 155, 183];
    points.forEach((idx, i) => {
        if (idx >= data.length) return;
        const isBuy = i % 2 === 0;
        const isRazgon = i === 0 || i === 3;
        const score = isRazgon ? 97 : 83 + Math.floor(Math.random() * 11);
        if (isConfluence && score < 89) return;
        markers.push({
            time: data[idx].time,
            position: isBuy ? 'belowBar' : 'aboveBar',
            color: isRazgon ? '#ff00ff' : (isBuy ? '#22c55e' : '#ef4444'),
            shape: isBuy ? 'arrowUp' : 'arrowDown',
            text: isRazgon ? "⚡ RAZGON" : (isBuy ? "ICT BUY" : "ICT SELL"),
            size: isRazgon ? 9 : 6
        });
    });
    candleSeries.setMarkers(markers);
}

function updateLivePrice() {
    const priceEl = document.getElementById('current-price');
    let price = currentMarket === 2 ? 1248.65 : 65234;
    setInterval(() => {
        price += (Math.random() - 0.47) * (currentMarket === 2 ? 14 : 80);
        priceEl.textContent = price.toFixed(currentMarket === 2 ? 2 : 0);
    }, 1700);
}

function switchMarket(index) {
    currentMarket = index;
    document.querySelectorAll('#market-tabs button').forEach(btn => btn.classList.remove('active'));
    document.querySelector(`#market-tabs button[data-market="${index}"]`).classList.add('active');
    currentSymbol = symbolsByMarket[index][0];
    document.getElementById('current-symbol').textContent = currentSymbol;
    renderChart();
    updateSymbols();
}

function updateSymbols() {
    const container = document.getElementById('symbols-list');
    container.innerHTML = '';
    symbolsByMarket[currentMarket].forEach(sym => {
        const active = sym === currentSymbol;
        const btn = document.createElement('button');
        btn.className = `px-6 py-3 text-sm font-mono rounded-2xl transition-all ${active ? 'bg-gradient-to-r from-cyan-400 to-violet-400 text-black font-bold shadow-lg' : 'bg-slate-900 hover:bg-slate-800'}`;
        btn.textContent = sym;
        btn.onclick = () => {
            currentSymbol = sym;
            document.getElementById('current-symbol').textContent = sym;
            renderChart();
        };
        container.appendChild(btn);
    });
}

function renderStrategies() {
    const container = document.getElementById('strategy-list');
    container.innerHTML = `
        <div onclick="toggleStrategy(this)" class="razgon-glow flex justify-between items-center bg-slate-900 p-5 rounded-3xl cursor-pointer border border-fuchsia-500/30">
            <div class="flex items-center gap-4"><span class="text-4xl">⚡</span><span class="font-semibold">Razgon Strategy</span></div>
            <span class="text-emerald-400 text-sm font-bold">ACTIVE</span>
        </div>
        <div onclick="toggleStrategy(this)" class="flex justify-between items-center bg-slate-900 hover:bg-slate-800 p-5 rounded-3xl cursor-pointer">
            <div class="flex items-center gap-4"><span class="text-4xl">📍</span><span>ICT Order Blocks</span></div>
            <span class="text-emerald-400 text-sm">ON</span>
        </div>
        <div onclick="toggleStrategy(this)" class="flex justify-between items-center bg-slate-900 hover:bg-slate-800 p-5 rounded-3xl cursor-pointer">
            <div class="flex items-center gap-4"><span class="text-4xl">📈</span><span>EMA Cross</span></div>
            <span class="text-emerald-400 text-sm">ON</span>
        </div>
    `;
}

function toggleStrategy(el) {
    el.classList.toggle('!bg-emerald-900/60');
}

function toggleConfluence() {
    isConfluence = !isConfluence;
    const label = document.getElementById('confluence-label');
    label.textContent = isConfluence ? "Confluence ON" : "Confluence OFF";
    label.parentElement.classList.toggle('bg-emerald-600', isConfluence);
    renderChart();
}

function updateRisk(val) {
    document.getElementById('risk-value').textContent = parseFloat(val).toFixed(1) + '%';
    const riskAmount = balance * (parseFloat(val) / 100);
    const lot = (riskAmount / 92).toFixed(2);
    document.getElementById('lot-size').textContent = lot;
    document.getElementById('est-risk').textContent = '$' + riskAmount.toFixed(2);
}

function renderPositions() {
    const container = document.getElementById('positions-list');
    container.innerHTML = positions.length === 0 ? 
        `<div class="text-center py-16 text-slate-500">Hozircha ochiq pozitsiya yo‘q</div>` : '';

    positions.forEach((pos, i) => {
        const div = document.createElement('div');
        div.className = `glass rounded-3xl p-5 signal-card`;
        div.innerHTML = `
            <div class="flex justify-between">
                <span class="font-mono">${pos.symbol}</span>
                <span class="${pos.type === 'BUY' ? 'text-emerald-400' : 'text-red-400'} font-bold">${pos.type}</span>
            </div>
            <div class="text-xs mt-3 flex justify-between text-slate-400">
                <span>${pos.lot} lot</span>
                <span class="${pos.pl >= 0 ? 'text-emerald-400' : 'text-red-400'}">$${pos.pl}</span>
            </div>
            <button onclick="closePosition(${i})" class="mt-4 w-full py-2 text-xs bg-red-500/80 hover:bg-red-600 rounded-2xl">YOPISH</button>
        `;
        container.appendChild(div);
    });
    document.getElementById('positions-count').textContent = positions.length;
}

function closePosition(index) {
    if (!confirm("Pozitsiyani yopishni xohlaysizmi?")) return;
    const pos = positions.splice(index, 1)[0];
    balance += pos.pl;
    document.getElementById('balance').textContent = '$' + balance.toFixed(2);
    renderPositions();
    updateEquity();
}

function closeAllPositions() {
    if (positions.length === 0 || !confirm("Barcha pozitsiyalarni yopish?")) return;
    let total = positions.reduce((a, b) => a + b.pl, 0);
    balance += total;
    document.getElementById('balance').textContent = '$' + balance.toFixed(2);
    positions = [];
    renderPositions();
    updateEquity();
}

function updateEquity() {
    const openPL = positions.reduce((sum, p) => sum + p.pl, 0);
    equity = balance + openPL;
    document.getElementById('equity').innerHTML = `$${equity.toFixed(2)} <span class="text-xs text-emerald-400">(+0.50%)</span>`;
    document.getElementById('total-pl').textContent = (openPL >= 0 ? '+' : '') + '$' + openPL.toFixed(2);
    document.getElementById('total-pl').className = openPL >= 0 ? "text-3xl font-bold text-emerald-400" : "text-3xl font-bold text-red-400";
}

function addToLog(signal) {
    const container = document.getElementById('signal-log');
    const div = document.createElement('div');
    div.className = `glass p-5 rounded-3xl signal-card ${signal.isBuy ? 'border-l-4 border-emerald-400' : 'border-l-4 border-red-400'}`;
    div.innerHTML = `
        <div class="flex gap-4">
            <div class="text-4xl">${signal.emoji}</div>
            <div class="flex-1">
                <div class="font-semibold text-base">${signal.name}</div>
                <div class="text-xs text-slate-400">${signal.symbol} • M15</div>
                <div class="text-cyan-400 font-medium">${signal.confluence}% confluence</div>
            </div>
        </div>
    `;
    container.prepend(div);
    if (container.children.length > 9) container.removeChild(container.lastChild);
}

function takePosition(signal) {
    const lot = parseFloat(document.getElementById('lot-size').textContent) || 0.21;
    const pl = (Math.random() * 480 - 90).toFixed(2);
    positions.unshift({
        symbol: currentSymbol,
        type: signal.isBuy ? 'BUY' : 'SELL',
        lot: lot,
        pl: parseFloat(pl)
    });
    renderPositions();
    updateEquity();
}

function addRandomSignal() {
    const isBuy = Math.random() > 0.45;
    const names = ["RAZGON", "ICT Order Block", "EMA 9/21 Cross", "SMC Liquidity Grab", "Bollinger Squeeze"];
    const name = names[Math.floor(Math.random() * names.length)];

    const signal = {
        emoji: isBuy ? '⬆️' : '⬇️',
        name: `${name} ${isBuy ? 'BUY' : 'SELL'}`,
        symbol: currentSymbol,
        confluence: isConfluence ? 91 + Math.floor(Math.random() * 8) : 74 + Math.floor(Math.random() * 20),
        isBuy: isBuy
    };

    if (isConfluence && signal.confluence < 88) return;

    addToLog(signal);
    if (Math.random() > 0.4) takePosition(signal);
}

function scanMarket() {
    const btn = document.querySelector('button[onclick="scanMarket()"]');
    const orig = btn.innerHTML;
    btn.innerHTML = `<i class="fas fa-spinner fa-spin mr-2"></i>SCANNING...`;
    btn.disabled = true;
    setTimeout(() => {
        renderChart();
        for (let i = 0; i < 4; i++) addRandomSignal();
        btn.innerHTML = orig;
        btn.disabled = false;
    }, 900);
}

function clearLog() {
    document.getElementById('signal-log').innerHTML = '';
}

// Neural Vision (7-bosqichdan)
function handleFile(file) {
    if (!file || !file.type.startsWith('image/')) return alert("Faqat rasm faylini yuklang!");
    const dropZone = document.getElementById('drop-zone');
    dropZone.innerHTML = `<i class="fas fa-spinner fa-spin text-6xl text-violet-400"></i><p class="mt-6">AI tahlil qilinmoqda...</p>`;
    setTimeout(showAnalysisResult, 1600);
}

function showAnalysisResult() {
    document.getElementById('drop-zone').classList.add('hidden');
    const resultDiv = document.getElementById('analysis-result');
    resultDiv.classList.remove('hidden');
    resultDiv.innerHTML = `
        <div class="glass rounded-3xl p-7 text-center">
            <div class="text-violet-400 text-sm font-bold">NEURAL VISION DETECTED</div>
            <div class="text-6xl font-bold mt-4 text-emerald-400">STRONG BUY</div>
            <div class="text-7xl font-mono text-cyan-400 my-6">96%</div>
            <div class="text-slate-300">RAZGON + ICT + EMA Confluence</div>
            <div class="mt-8 flex gap-4">
                <button onclick="executeTradeFromAnalysis()" class="flex-1 py-4 bg-gradient-to-r from-cyan-500 to-fuchsia-500 rounded-3xl font-bold">TRADE OCHISH</button>
                <button onclick="resetAnalyzer()" class="flex-1 py-4 bg-slate-700 rounded-3xl font-bold">YANA YUKLASH</button>
            </div>
        </div>
    `;
}

function executeTradeFromAnalysis() {
    alert("Neural Signal bo‘yicha trade ochildi!");
    addRandomSignal();
}

function resetAnalyzer() {
    document.getElementById('analysis-result').classList.add('hidden');
    document.getElementById('drop-zone').classList.remove('hidden');
    document.getElementById('drop-zone').innerHTML = `
        <i class="fas fa-cloud-upload-alt text-6xl text-slate-500 mb-4"></i>
        <p class="font-medium text-center">Screenshot yuklang<br>yoki shu yerga torting</p>
    `;
}

// Drag & Drop
const dropZone = document.getElementById('drop-zone');
const fileInput = document.getElementById('screenshot-input');
dropZone.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', e => e.target.files[0] && handleFile(e.target.files[0]));

dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.style.borderColor = '#a855f7'; });
dropZone.addEventListener('dragleave', () => dropZone.style.borderColor = '#475569');
dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.style.borderColor = '#475569';
    if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
});

function changeTimeframe(tf) {
    currentTimeframe = tf;
    document.querySelectorAll('.timeframe-btn').forEach((el, i) => el.classList.toggle('bg-slate-700', i === tf));
    renderChart();
}

function toggleLanguage() {
    language = language === 'uz' ? 'en' : 'uz';
    document.getElementById('current-lang').textContent = language.toUpperCase();
}

function toggleFullScreen() {
    if (!document.fullscreenElement) document.documentElement.requestFullscreen();
    else document.exitFullscreen();
}

function initializeApp() {
    createChart();
    renderChart();
    updateSymbols();
    renderStrategies();
    updateRisk(1.8);
    renderPositions();

    document.getElementById('current-symbol').textContent = currentSymbol;

    updateLivePrice();
    setTimeout(() => addRandomSignal(), 600);
    setTimeout(() => addRandomSignal(), 1400);
    setTimeout(() => addRandomSignal(), 2200);

    console.log('%c8-BOSQICH TUGADI — Dizayn to‘liq polished! Neon, glow va premium ko‘rinish qo‘shildi.', 'color:#ff00ff; font-size:16px; font-weight:bold');
}

window.onload = initializeApp;
</script>
