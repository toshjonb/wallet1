<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<title>SMART HAMYON</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-black text-white text-center p-10">

<h1 class="text-3xl text-cyan-400 mb-4">SMART HAMYON 🚀</h1>

<button onclick="getData()" class="bg-cyan-500 px-4 py-2 rounded">
  Test API
</button>

<div id="out" class="mt-4"></div>

<script>
async function getData(){
  let res = await fetch("/auth")
  let data = await res.json()
  document.getElementById("out").innerText = JSON.stringify(data)
}
</script>

</body>
</html>
