<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trading Sniper Signal – Antigravity Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    <script src="app.js" defer></script>
</head>
<body class="bg-zinc-950 text-slate-200 min-h-screen overflow-hidden">
    <div class="flex h-screen">

        <!-- SIDEBAR -->
        <div class="w-72 glass border-r border-slate-700 flex flex-col">
            <div class="p-6 border-b border-slate-700">
                <div class="flex items-center gap-3">
                    <div class="w-11 h-11 bg-gradient-to-br from-cyan-400 to-magenta-500 rounded-2xl flex items-center justify-center text-3xl font-bold">⚡</div>
                    <div>
                        <h1 class="text-3xl font-bold tracking-tighter neon-text-cyan">SNIPER</h1>
                        <p class="text-xs text-slate-400 -mt-1">ANTIGRAVITY EDITION</p>
                    </div>
                </div>
            </div>

            <div class="p-4 flex gap-3">
                <button onclick="toggleLanguage()" class="flex-1 py-3 bg-slate-800 hover:bg-slate-700 rounded-2xl text-sm font-medium flex items-center justify-center gap-2">
                    <span id="current-lang">UZ</span>
                    <i class="fas fa-globe"></i>
                </button>
                <button onclick="scanMarket()" class="flex-1 py-3 bg-gradient-to-r from-cyan-500 to-emerald-500 hover:from-cyan-600 hover:to-emerald-600 rounded-2xl text-sm font-semibold flex items-center justify-center gap-2">
                    <i class="fas fa-bolt"></i>
                    <span id="scan-text">Bozorni skanerlash</span>
                </button>
            </div>

            <div class="px-4">
                <div class="text-xs uppercase tracking-widest text-slate-500 mb-3 px-2">Bozorlar</div>
                <div class="grid grid-cols-2 gap-2" id="market-tabs">
                    <button onclick="switchMarket(0)" class="market-tab py-3 px-4 rounded-2xl text-sm font-medium" data-market="0">Forex</button>
                    <button onclick="switchMarket(1)" class="market-tab py-3 px-4 rounded-2xl text-sm font-medium" data-market="1">Crypto</button>
                    <button onclick="switchMarket(2)" class="market-tab active py-3 px-4 rounded-2xl text-sm font-medium" data-market="2">Synthetic</button>
                    <button onclick="switchMarket(3)" class="market-tab py-3 px-4 rounded-2xl text-sm font-medium" data-market="3">Aksiyalar</button>
                </div>
            </div>

            <div class="px-4 mt-6">
                <div class="text-xs uppercase tracking-widest text-slate-500 mb-3 px-2">Simvollar</div>
                <div class="flex flex-wrap gap-2" id="symbols-list"></div>
            </div>

            <div class="flex-1 px-4 mt-6 overflow-auto">
                <div class="flex items-center justify-between mb-4 px-2">
                    <div class="text-xs uppercase tracking-widest text-slate-500">Strategiyalar</div>
                    <label class="relative inline-flex items-center cursor-pointer">
                        <input type="checkbox" id="confluence-toggle" onchange="toggleConfluence()" class="sr-only peer">
                        <div class="w-11 h-6 bg-slate-700 rounded-full peer peer-checked:bg-emerald-500 after:content-[''] after:absolute after:top-0.5 after:left-0.5 after:bg-white after:rounded-full after:h-5 after:w-5 after:transition-all"></div>
                        <span class="ml-2 text-xs font-medium" id="confluence-label">Confluence</span>
                    </label>
                </div>
                <div id="strategy-list" class="space-y-2"></div>
            </div>

            <div class="p-4 border-t border-slate-700 text-xs text-slate-500 text-center">
                99% signal aniqligi • Mock Demo
            </div>
        </div>

        <!-- MAIN AREA -->
        <div class="flex-1 flex flex-col">
            <div class="h-16 glass border-b border-slate-700 flex items-center px-6 justify-between">
                <div class="flex items-center gap-6">
                    <span id="current-symbol" class="text-3xl font-mono font-bold">Volatility 75</span>
                    <span id="current-price" class="text-emerald-400 text-2xl font-mono">1256.340</span>
                    <span id="price-change" class="text-emerald-400 text-sm font-medium">+0.87%</span>
                </div>

                <div class="flex gap-2 text-sm" id="timeframes">
                    <div onclick="changeTimeframe(0)" class="timeframe-btn px-4 py-1.5 rounded-xl cursor-pointer" data-tf="0">1m</div>
                    <div onclick="changeTimeframe(1)" class="timeframe-btn px-4 py-1.5 rounded-xl cursor-pointer" data-tf="1">5m</div>
                    <div onclick="changeTimeframe(2)" class="timeframe-btn active px-4 py-1.5 rounded-xl cursor-pointer" data-tf="2">15m</div>
                    <div onclick="changeTimeframe(3)" class="timeframe-btn px-4 py-1.5 rounded-xl cursor-pointer" data-tf="3">1H</div>
                    <div onclick="changeTimeframe(4)" class="timeframe-btn px-4 py-1.5 rounded-xl cursor-pointer" data-tf="4">4H</div>
                </div>

                <button onclick="toggleFullScreen()" class="px-6 py-2 bg-slate-800 hover:bg-slate-700 rounded-2xl">
                    <i class="fas fa-expand"></i>
                </button>
            </div>

            <div class="flex-1 p-4 bg-zinc-950">
                <div id="chart" class="w-full h-full rounded-3xl border border-slate-700 shadow-2xl"></div>
            </div>

            <!-- Neural Vision -->
            <div class="h-72 glass border-t border-slate-700 flex">
                <div id="drop-zone" class="flex-1 flex flex-col items-center justify-center border-r border-slate-700 cursor-pointer hover:bg-slate-900/50 transition-colors"
                     onclick="document.getElementById('image-upload').click()">
                    <input type="file" id="image-upload" accept="image/*" class="hidden" onchange="analyzeScreenshot(event)">
                    <i class="fas fa-cloud-upload-alt text-6xl text-slate-500 mb-4"></i>
                    <p class="text-slate-300">Screenshot yuklang yoki torting</p>
                </div>
                <div class="flex-1 p-6 overflow-auto" id="analysis-result">
                    <div id="analysis-placeholder" class="text-center py-20 text-slate-400">
                        <i class="fas fa-brain text-6xl mb-6 opacity-40"></i>
                        <p>AI tahlili natijasi shu yerda paydo bo'ladi</p>
                    </div>
                    <div id="analysis-content" class="hidden"></div>
                </div>
            </div>
        </div>

        <!-- RIGHT PANEL -->
        <div class="w-80 glass border-l border-slate-700 flex flex-col">
            <div class="p-6">
                <h2 class="text-xl font-semibold">Demo Hisob</h2>
                <div id="balance" class="text-4xl font-mono font-bold text-emerald-400">12,458.75</div>
                <div class="text-xs text-slate-400">USD</div>
            </div>

            <div class="px-6">
                <div class="bg-slate-900 rounded-3xl p-6">
                    <div class="flex justify-between text-sm mb-4">
                        <span class="text-slate-400">Risk %</span>
                        <span id="risk-value" class="font-mono">0.5</span>
                    </div>
                    <input type="range" min="0.1" max="5" step="0.1" value="0.5" id="risk-slider"
                           class="w-full accent-cyan-400" oninput="updateRisk(this.value)">
                </div>
            </div>

            <div class="flex-1 px-6 mt-6 overflow-auto">
                <div class="text-xs uppercase tracking-widest text-slate-500 mb-3">Ochiq pozitsiyalar</div>
                <div id="positions-list" class="space-y-3"></div>
            </div>

            <div class="border-t border-slate-700 h-80 flex flex-col">
                <div class="px-6 py-4 bg-slate-900/70 flex justify-between text-xs uppercase text-slate-500">
                    <span>Signal Log</span>
                    <button onclick="clearLog()" class="text-cyan-400 hover:text-white">Tozalash</button>
                </div>
                <div id="signal-log" class="flex-1 overflow-auto p-4 space-y-3"></div>
            </div>
        </div>
    </div>
</body>
</html>
