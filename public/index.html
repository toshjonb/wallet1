```html id="realfull99"
<script>

// ================= GLOBAL =================
let chart, candleSeries
let currentMarket = 2
let currentSymbol = "Volatility 75"
let currentTimeframe = 2
let isConfluence = false
let language = "uz"

let balance = 12458.75
let equity = 12521.40
let positions = []

// ================= CHART =================
function createChart(){
    const el = document.getElementById("chart")

    chart = LightweightCharts.createChart(el,{
        width: el.clientWidth,
        height: el.clientHeight,
        layout:{ background:{color:"#0a0f1c"}, textColor:"#94a3b8"},
        grid:{ vertLines:{color:"#1e2937"}, horzLines:{color:"#1e2937"} },
        crosshair:{ mode: LightweightCharts.CrosshairMode.Normal }
    })

    candleSeries = chart.addCandlestickSeries({
        upColor:"#22c55e",
        downColor:"#ef4444",
        borderUpColor:"#22c55e",
        borderDownColor:"#ef4444",
        wickUpColor:"#86efac",
        wickDownColor:"#f87171"
    })
}

// ================= DATA =================
function generateMockCandles(){
    let data=[]
    let time=Math.floor(Date.now()/1000)-10000
    let price=1248

    for(let i=0;i<200;i++){
        let open=price
        let change=(Math.random()-0.5)*10
        let close=open+change
        let high=Math.max(open,close)+Math.random()*5
        let low=Math.min(open,close)-Math.random()*5

        data.push({
            time,
            open:+open.toFixed(2),
            high:+high.toFixed(2),
            low:+low.toFixed(2),
            close:+close.toFixed(2)
        })

        price=close
        time+=60
    }
    return data
}

// ================= RENDER =================
function renderChart(){
    const data=generateMockCandles()
    candleSeries.setData(data)

    const markers = data.filter((_,i)=>i%35===0).map(d=>({
        time:d.time,
        position: Math.random()>0.5 ? "belowBar":"aboveBar",
        color:"#ff00ff",
        shape: Math.random()>0.5 ? "arrowUp":"arrowDown",
        text:"SIGNAL"
    }))

    candleSeries.setMarkers(markers)
}

// ================= PRICE =================
function updateLivePrice(){
    const el=document.getElementById("current-price")
    let price=1248

    setInterval(()=>{
        price+=(Math.random()-0.5)*5
        el.textContent=price.toFixed(2)
    },1500)
}

// ================= SYMBOL =================
function updateSymbols(){
    const box=document.getElementById("symbols-list")
    box.innerHTML=""

    const arr=["Volatility 75","BTCUSDT","ETHUSDT","EURUSD"]

    arr.forEach(sym=>{
        const btn=document.createElement("button")
        btn.className="px-3 py-2 bg-slate-800 rounded-xl"
        btn.innerText=sym

        btn.onclick=()=>{
            currentSymbol=sym
            document.getElementById("current-symbol").textContent=sym
            renderChart()
        }

        box.appendChild(btn)
    })
}

// ================= STRATEGY =================
function renderStrategies(){
    document.getElementById("strategy-list").innerHTML=`
    <div class="razgon-glow p-4 bg-slate-800 rounded-xl">⚡ Razgon Strategy</div>
    <div class="p-4 bg-slate-800 rounded-xl">📍 ICT</div>
    <div class="p-4 bg-slate-800 rounded-xl">📈 EMA</div>
    `
}

// ================= SIGNAL =================
function addRandomSignal(){
    const box=document.getElementById("signal-log")

    const isBuy=Math.random()>0.5

    const div=document.createElement("div")
    div.className=`glass p-4 rounded-xl border-l-4 ${isBuy?'border-emerald-400':'border-red-400'}`

    div.innerHTML=`
        <b>${isBuy?'BUY':'SELL'} SIGNAL</b><br>
        ${currentSymbol}<br>
        Entry: ${Math.floor(Math.random()*2000)}<br>
        TP: ${Math.floor(Math.random()*2000)}<br>
        SL: ${Math.floor(Math.random()*2000)}
    `

    box.prepend(div)

    if(box.children.length>12){
        box.removeChild(box.lastChild)
    }
}

// ================= POSITIONS =================
function renderPositions(){
    const box=document.getElementById("positions-list")
    box.innerHTML=""

    positions.forEach(p=>{
        const div=document.createElement("div")
        div.className="glass p-3 rounded-xl"
        div.innerHTML=`
            ${p.symbol} (${p.type})<br>
            Lot: ${p.lot} | P/L: $${p.pl}
        `
        box.appendChild(div)
    })
}

// ================= RISK =================
function updateRisk(val){
    document.getElementById("risk-value").textContent=val+"%"
    const lot=(balance*(val/100)/100).toFixed(2)
    document.getElementById("lot-size").textContent=lot
    document.getElementById("est-risk").textContent="$"+(balance*(val/100)).toFixed(2)
}

// ================= PANEL DRAG =================
function initializeResizablePanel(){
    const panel=document.getElementById("signal-panel")
    const drag=document.getElementById("signal-drag-handle")

    let startY,startH,active=false

    drag.onmousedown=e=>{
        active=true
        startY=e.clientY
        startH=panel.offsetHeight
    }

    document.onmousemove=e=>{
        if(!active) return
        let newH=startH+(startY-e.clientY)
        panel.style.height=Math.max(180,newH)+"px"
    }

    document.onmouseup=()=>active=false
}

// ================= ACTION =================
function scanMarket(){
    for(let i=0;i<4;i++) addRandomSignal()
}

function clearLog(){
    document.getElementById("signal-log").innerHTML=""
}

function toggleLanguage(){
    language = language==="uz"?"en":"uz"
    document.getElementById("current-lang").textContent=language.toUpperCase()
}

function changeTimeframe(tf){
    currentTimeframe=tf
    renderChart()
}

function toggleFullScreen(){
    if(!document.fullscreenElement){
        document.documentElement.requestFullscreen()
    }else{
        document.exitFullscreen()
    }
}

// ================= INIT =================
function initializeApp(){
    createChart()
    renderChart()
    updateSymbols()
    renderStrategies()
    updateLivePrice()
    initializeResizablePanel()
    renderPositions()
    updateRisk(1.8)

    document.getElementById("current-symbol").textContent=currentSymbol

    setInterval(addRandomSignal,4000)
}

window.onload=initializeApp

</script>
```
